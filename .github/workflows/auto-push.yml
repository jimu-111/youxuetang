  name: auto-push
  on:
    workflow_dispatch:
    schedule:
      - cron: "0 6 * * 1"
  jobs:
    flag:
      runs-on: ubuntu-latest
      steps:
        - name: Set flag
          run: |
            curl -s -X POST '${{ secrets.SUPABASE_URL }}/rest/v1/app_data' \
              -H 'apikey: ${{ secrets.SUPABASE_KEY }}' \
              -H 'Authorization: Bearer ${{ secrets.SUPABASE_KEY }}' \
              -H 'Content-Type: application/json' \
              -H 'Prefer: resolution=merge-duplicates' \
              -d '[{"key":"_auto_push_flag","value":"{\"needed\":true}","updated_at":"2026-07-09T00:00:00Z"}]'
