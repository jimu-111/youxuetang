<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>优学堂 — 授权回调</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f6;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:24px;padding:40px 32px;text-align:center;max-width:400px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,0.1)}
.spinner{width:48px;height:48px;border:4px solid #eef2f6;border-top-color:#2a5298;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{font-size:3rem;margin-bottom:12px}
.err{font-size:3rem;margin-bottom:12px}
h2{color:#1f3a6b;margin-bottom:8px}
p{color:#5e6f8d;font-size:0.9rem;line-height:1.6}
</style>
</head>
<body>
<div class="card">
    <div id="status">
        <div class="spinner"></div>
        <h2>正在激活授权…</h2>
        <p>请稍候，不要关闭此页面</p>
    </div>
</div>
<script>
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmeHduaXhsdmR4YXdveWxoZ3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDEyNzIsImV4cCI6MjA5Nzc3NzI3Mn0.aPfO4Ry_LzoOColCVx64JQPF-BWga-_J2fX9hg-E4G8';
var PROXY='https://zfxwnixlvdxawoylhgxj.supabase.co/functions/v1/feishu-proxy';
var SUPABASE_URL='https://zfxwnixlvdxawoylhgxj.supabase.co';
var APP_ID='cli_aab1fa4e87bbdbd3';
var APP_SECRET='1uLKmOkzQpoac6Ixw3Qhsb6KR1gCrcTn';

(async function(){
    var m = location.search.match(/[?&]code=([^&]+)/);
    if (!m) {
        document.getElementById('status').innerHTML = '<div class="err">❌</div><h2>缺少授权码</h2><p>请从应用内重新发起授权</p>';
        return;
    }
    var code = decodeURIComponent(m[1]);
    try {
        // Step 1: 获取 app_access_token
        var r1 = await fetch(PROXY, {
            method:'POST',
            headers:{
                'Authorization':'Bearer '+SUPABASE_KEY,
                'x-target-url':'https://open.feishu.cn/open-apis/auth/v3/app_access_token/internal',
                'x-target-method':'POST',
                'x-target-content-type':'application/json'
            },
            body:JSON.stringify({app_id:APP_ID,app_secret:APP_SECRET})
        });
        var d1 = await r1.json();
        if (d1.code !== 0) throw new Error('获取app_token失败: '+JSON.stringify(d1));
        // Step 2: 用code换用户token
        var r2 = await fetch(PROXY, {
            method:'POST',
            headers:{
                'Authorization':'Bearer '+SUPABASE_KEY,
                'x-target-url':'https://open.feishu.cn/open-apis/authen/v1/oidc/access_token',
                'x-target-method':'POST',
                'x-target-content-type':'application/json',
                'x-target-auth':'Bearer '+d1.app_access_token
            },
            body:JSON.stringify({grant_type:'authorization_code',code:code})
        });
        var d2 = await r2.json();
        if (d2.code !== 0 || !d2.data) throw new Error('换token失败: '+(d2.msg||d2.code));
        // Step 3: 保存到 Supabase（云端共享）
        var tokenData = {
            access_token: d2.data.access_token,
            refresh_token: d2.data.refresh_token,
            expiresAt: Date.now() + d2.data.expires_in * 1000
        };
        var tokenStr = JSON.stringify(tokenData);
        await fetch(SUPABASE_URL+'/rest/v1/app_data', {
            method:'POST',
            headers:{
                'apikey':SUPABASE_KEY,
                'Authorization':'Bearer '+SUPABASE_KEY,
                'Content-Type':'application/json',
                'Prefer':'resolution=merge-duplicates'
            },
            body:JSON.stringify({key:'feishu_token',value:tokenStr,updated_at:new Date().toISOString()})
        });
        document.getElementById('status').innerHTML = '<div class="ok">✅</div><h2>授权成功！</h2><p>token 已上传到云端<br>桌面应用将自动检测并恢复数据</p>';
    } catch(e) {
        document.getElementById('status').innerHTML = '<div class="err">❌</div><h2>授权失败</h2><p>'+e.message+'</p>';
    }
})();
</script>
</body>
</html>
